<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おみくじWebアプリ（仮） - 第5回 みやぎ地域おこし協力隊フェス</title>

  <!--
  ============================================================
  検索エンジンへのインデックスを禁止する設定
  GitHub Pages で公開してもGoogle等の検索結果に表示されなくなります
  ============================================================
  -->
  <meta name="robots" content="noindex, nofollow">

  <!--
  ============================================================
  Google Analytics 4 (GA4) 設定
  ★ 以下の「G-XXXXXXXXXX」を、あなたのGA4測定IDに書き換えてください
  　 例: G-ABC1234567
  　 GA4測定IDの確認方法: Googleアナリティクス > 管理 > データストリーム > ウェブ
  ============================================================
  -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    // GA4の初期化設定
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    // ★ こちらの「G-XXXXXXXXXX」も測定IDに書き換えてください
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <!-- Google Fonts: 和風フォントを読み込む -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- スタイルシートの読み込み -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== ページ全体の背景装飾 ========== -->
  <div class="page-background" aria-hidden="true">
    <!-- 装飾用の和柄ドット（CSSで描画） -->
    <div class="bg-pattern"></div>
  </div>

  <!-- ========== メインコンテンツ ========== -->
  <main class="main-container">

    <!-- ヘッダー部分 -->
    <header class="app-header">
      <p class="app-subtitle">第5回 みやぎ地域おこし協力隊フェス</p>
      <h1 class="app-title">
        <span class="title-deco" aria-hidden="true">⛩</span>
        おみくじ
        <span class="title-deco" aria-hidden="true">⛩</span>
      </h1>
    </header>

    <!-- ========== 初期表示エリア（ボタン） ========== -->
    <!--
      id="start-screen" : 最初に表示される画面
      おみくじを引いたら非表示になる
    -->
    <section id="start-screen" class="start-screen">
      <div class="omikuji-box" aria-hidden="true">
        <!-- おみくじ筒のイラスト（CSS + テキストで表現） -->
        <div class="omikuji-tube">
          <div class="tube-top"></div>
          <div class="tube-body">
            <span class="tube-label">御神籤</span>
          </div>
          <div class="tube-sticks">
            <div class="stick"></div>
            <div class="stick"></div>
            <div class="stick"></div>
          </div>
        </div>
      </div>

      <p class="start-message">
        ボタンを押して<br>今日の運勢を占おう！
      </p>

      <!--
        おみくじを引くボタン
        クリックすると drawOmikuji() 関数が呼ばれる
      -->
      <button
        id="draw-button"
        class="draw-button"
        onclick="drawOmikuji()"
        aria-label="おみくじを引く"
      >
        <span class="button-icon" aria-hidden="true">🎋</span>
        おみくじを引く
      </button>
    </section>

    <!-- ========== 結果表示エリア ========== -->
    <!--
      id="result-screen" : おみくじ結果が表示される画面
      最初は非表示（JavaScriptで表示切り替え）
    -->
    <section id="result-screen" class="result-screen hidden" aria-live="polite">

      <!-- 結果カード（巻物風デザイン） -->
      <div class="result-card" id="result-card">

        <!-- カード上部の装飾 -->
        <div class="card-scroll-top" aria-hidden="true">
          <div class="scroll-rod"></div>
        </div>

        <!-- 結果の画像エリア -->
        <!--
          data.json の image フィールドに画像ファイル名を設定すると表示される
          画像は images/ フォルダに保存してください
        -->
        <div id="result-image-area" class="result-image-area hidden">
          <img
            id="result-image"
            src=""
            alt="おみくじ結果の画像"
            class="result-image"
            onerror="this.parentElement.classList.add('hidden')"
          >
        </div>

        <!-- ランダム要素① : 運勢ランク -->
        <div class="result-item result-rank-area">
          <p class="result-label">運　勢</p>
          <p id="result-rank" class="result-rank">大吉</p>
        </div>

        <!-- 区切り線 -->
        <div class="divider" aria-hidden="true"><span>✦ ✦ ✦</span></div>

        <!-- ランダム要素② : 自治体 -->
        <div class="result-item">
          <p class="result-label">開運スポット</p>
          <p id="result-message" class="result-message">仙台市</p>
        </div>

        <!-- 区切り線 -->
        <div class="divider" aria-hidden="true"><span>✦ ✦ ✦</span></div>

        <!-- ランダム要素③ : セット項目（ラベル＋内容がセット） -->
        <div class="result-item">
          <!--
            ③-1 : セットのラベル（例：「ラッキーカラー」「今日のヒント」など）
            ③-2 : セットの内容（例：「赤」「早起きが吉」など）
            data.json の set_label と set_content で管理します
          -->
          <p class="result-label" id="result-set-label">ラッキーカラー</p>
          <p id="result-set-content" class="result-set-content">赤</p>
        </div>

        <!-- カード下部の装飾 -->
        <div class="card-scroll-bottom" aria-hidden="true">
          <div class="scroll-rod"></div>
        </div>

      </div><!-- /.result-card -->

      <!-- もう一度引くボタン -->
      <button
        id="retry-button"
        class="retry-button"
        onclick="resetOmikuji()"
        aria-label="もう一度おみくじを引く"
      >
        <span class="button-icon" aria-hidden="true">🔄</span>
        もう一度引く
      </button>

    </section><!-- /#result-screen -->

  </main><!-- /.main-container -->

  <!-- ========== フッター ========== -->
  <footer class="app-footer">
    <p>第5回 地域おこし協力隊フェス</p>
  </footer>

  <!-- ========== JavaScript ========== -->
  <script>
    /*
    ============================================================
    おみくじWebアプリ メインスクリプト
    ============================================================
    【構成】
      1. データ読み込み
      2. おみくじを引く処理（メイン）
      3. 結果表示処理
      4. リセット処理
      5. ユーティリティ関数（補助的な機能）

    【data.jsonの構造】
      data.json の各配列から独立してランダム抽選されます。
      4つの要素はそれぞれ別々に選ばれるため、組み合わせは毎回異なります。

        ranks 配列  : ランダム要素① 運勢ランクの文字列リスト
                      使えるランクは「大吉 / 吉 / 中吉」の3種類のみ
                      同じランクを複数登録するとその分出やすくなります

        locals 配列 : ランダム要素② 地域メッセージのリスト
                      - id    : 管理用番号
                      - local : 表示するメッセージ本文

        sets 配列   : ランダム要素③（③-1と③-2はセット）のリスト
                      - id          : 管理用番号
                      - set_label   : ③-1 ラベル（例："ラッキーカラー"）
                      - set_content : ③-2 内容（例："赤"）
                      - image       : 画像ファイル名（images/フォルダに保存）
                                      画像なしの場合は "" でOK
    ============================================================
    */

    // ---------------------------------------------------------
    // グローバル変数
    // ---------------------------------------------------------

    /**
     * data.jsonから読み込んだ各要素の配列
     * それぞれ独立してランダム抽選されます
     */
    let rankList  = [];   // ランダム要素① 運勢ランクの文字列リスト
    let localList = [];   // ランダム要素② 地域メッセージのリスト
    let setList   = [];   // ランダム要素③ セット（ラベル＋内容）のリスト

    /** データの読み込みが完了したかどうかのフラグ */
    let isDataLoaded = false;

    // ---------------------------------------------------------
    // 1. データ読み込み：ページが開いたときに data.json を読み込む
    // ---------------------------------------------------------

    /**
     * data.jsonを非同期で読み込む関数
     * ページロード時に自動実行される
     */
    async function loadOmikujiData() {
      try {
        // data.json を取得する
        const response = await fetch('data.json');

        // 取得に失敗した場合はエラーを投げる
        if (!response.ok) {
          throw new Error('data.jsonの読み込みに失敗しました: ' + response.status);
        }

        // JSONデータをパース（変換）して各リストに保存
        const jsonData = await response.json();
        rankList  = jsonData.ranks;
        localList = jsonData.locals;
        setList   = jsonData.sets;

        // いずれかの配列が空の場合の警告
        if (!rankList  || rankList.length  === 0) throw new Error('data.jsonのranksが空です');
        if (!localList || localList.length === 0) throw new Error('data.jsonのlocalsが空です');
        if (!setList   || setList.length   === 0) throw new Error('data.jsonのsetsが空です');

        // 読み込み完了フラグを立てる
        isDataLoaded = true;
        console.log('おみくじデータを読み込みました。',
          'ranks:', rankList.length, '件 /  locals:', localList.length, '件 / sets:', setList.length, '件');

      } catch (error) {
        // エラーが発生した場合はコンソールに表示し、ユーザーにも通知
        console.error('データ読み込みエラー:', error);
        alert('おみくじデータの読み込みに失敗しました。\nページを再読み込みしてください。\n\nエラー詳細: ' + error.message);
      }
    }

    // ---------------------------------------------------------
    // 2. おみくじを引く処理（メイン）
    // ---------------------------------------------------------

    /**
     * おみくじを引くメイン処理
     * 「おみくじを引く」ボタンを押したときに呼ばれる
     */
    function drawOmikuji() {
      // データが読み込めていない場合は処理を止める
      if (!isDataLoaded) {
        alert('データを読み込み中です。しばらくお待ちください。');
        return;
      }

      // ① ② ③ それぞれ独立してランダムに1件ずつ選ぶ
      // ポイント: 別々の配列から別々に抽選するので、組み合わせは毎回異なります
      const selectedRank  = getRandomItem(rankList);   // ランダム要素①
      const selectedLocal = getRandomItem(localList);  // ランダム要素②
      const selectedSet   = getRandomItem(setList);    // ランダム要素③

      // GA4におみくじ実行回数のイベントを送信する
      // ★ GA4を導入する際に測定IDを設定してください（ファイル上部参照）
      sendAnalyticsEvent(selectedRank, selectedLocal);

      // 結果をカードに表示する（3つの結果を別々に渡す）
      displayResult(selectedRank, selectedLocal, selectedSet);

      // 画面を切り替える（ボタン画面を隠して結果画面を表示）
      showResultScreen();
    }

    // ---------------------------------------------------------
    // 3. 結果表示処理
    // ---------------------------------------------------------

    /**
     * 抽選された3つの結果を画面のカードに反映する
     * @param {string} rank         - ランダム要素① 運勢ランク文字列（例："大吉"）
     * @param {Object} localItem    - ランダム要素② 地域メッセージオブジェクト
     * @param {Object} setItem      - ランダム要素③ セットオブジェクト
     */
    function displayResult(rank, localItem, setItem) {
      // ランダム要素① : 運勢ランクを表示
      const rankElement = document.getElementById('result-rank');
      rankElement.textContent = rank;

      // 運勢ランクに応じてカードの色を変える（CSSクラスで管理）
      updateRankStyle(rankElement, rank);

      // ランダム要素② : 地域メッセージを表示（変数名: local）
      document.getElementById('result-message').textContent = localItem.local;

      // ランダム要素③ : セット（ラベル＋内容）を表示
      document.getElementById('result-set-label').textContent = setItem.set_label;
      document.getElementById('result-set-content').textContent = setItem.set_content;

      // 画像の表示処理（setItemに紐づく画像を表示）
      displayImage(setItem.image);
    }

    /**
     * 運勢ランクに応じてカードのスタイルを変える
     * @param {HTMLElement} element - ランク表示要素
     * @param {string} rank - 運勢ランク文字列（例："大吉"）
     */
    function updateRankStyle(element, rank) {
      // 既存のランククラスをすべて削除する
      element.className = 'result-rank';

      // ランクに応じてCSSクラスを追加する
      // data.jsonに新しいランクを追加する場合は、こことstyle.cssも更新してください
      if (rank === '大吉') {
        element.classList.add('rank-daikichi');
      } else if (rank === '吉') {
        element.classList.add('rank-kichi');
      } else if (rank === '中吉') {
        element.classList.add('rank-chukichi');
      } else if (rank === '小吉') {
        element.classList.add('rank-shokichi');
      } else if (rank === '末吉') {
        element.classList.add('rank-suekichi');
      } else if (rank === '凶') {
        element.classList.add('rank-kyo');
      } else {
        // 上記以外のランク（カスタムランクなど）はデフォルトスタイル
        element.classList.add('rank-other');
      }
    }

    /**
     * 画像を表示する（画像がない場合は画像エリアを隠す）
     * @param {string} imageFileName - 画像ファイル名（例: "kichi_01.png"）
     */
    function displayImage(imageFileName) {
      const imageArea = document.getElementById('result-image-area');
      const imageElement = document.getElementById('result-image');

      // 画像ファイル名が設定されている場合は表示
      if (imageFileName && imageFileName.trim() !== '') {
        imageElement.src = 'images/' + imageFileName;
        imageElement.alt = 'おみくじ結果の画像';
        imageArea.classList.remove('hidden');
      } else {
        // 画像なしの場合は画像エリアを非表示
        imageArea.classList.add('hidden');
        imageElement.src = '';
      }
    }

    // ---------------------------------------------------------
    // 4. 画面の切り替え処理
    // ---------------------------------------------------------

    /**
     * 結果画面を表示し、スタート画面を隠す
     * アニメーションも一緒に制御する
     */
    function showResultScreen() {
      const startScreen = document.getElementById('start-screen');
      const resultScreen = document.getElementById('result-screen');
      const resultCard = document.getElementById('result-card');

      // スタート画面を隠す
      startScreen.classList.add('hidden');

      // 結果画面を表示する
      resultScreen.classList.remove('hidden');

      // アニメーション再生のため、一度クラスを外してから付け直す
      resultCard.classList.remove('animate-open');
      // わずかな遅延を入れることでアニメーションが確実に再生される
      setTimeout(function () {
        resultCard.classList.add('animate-open');
      }, 10);

      // 結果画面の先頭にスクロール（スマートフォンでも見やすくするため）
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /**
     * 最初の状態に戻す（「もう一度引く」ボタンで呼ばれる）
     */
    function resetOmikuji() {
      const startScreen = document.getElementById('start-screen');
      const resultScreen = document.getElementById('result-screen');
      const resultCard = document.getElementById('result-card');

      // 結果画面を隠す
      resultScreen.classList.add('hidden');

      // アニメーションクラスをリセット
      resultCard.classList.remove('animate-open');

      // スタート画面を表示する
      startScreen.classList.remove('hidden');

      // ページの先頭に戻る
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ---------------------------------------------------------
    // 5. ユーティリティ関数（補助的な機能）
    // ---------------------------------------------------------

    /**
     * 配列からランダムに1件取り出す
     * @param {Array} array - 選択元の配列
     * @returns {*} ランダムに選ばれた要素
     */
    function getRandomItem(array) {
      // Math.random() で 0以上1未満の乱数を生成し、配列の長さをかけて整数に変換
      const randomIndex = Math.floor(Math.random() * array.length);
      return array[randomIndex];
    }

    /**
     * GA4におみくじ実行のイベントを送信する
     * @param {string} rank      - 出た運勢ランク
     * @param {Object} localItem - 出た地域メッセージオブジェクト
     */
    function sendAnalyticsEvent(rank, localItem) {
      // gtag関数が存在する場合のみ送信（GA4未設定の場合はスキップ）
      if (typeof gtag !== 'undefined') {
        gtag('event', 'omikuji_draw', {
          // イベントと一緒に記録するパラメータ
          'omikuji_rank':  rank,             // 出た運勢ランク
          'omikuji_local': localItem.local   // 出た地域メッセージ
        });
        console.log('GA4イベント送信: omikuji_draw, ランク:', rank);
      } else {
        console.log('GA4未設定のため、イベント送信をスキップしました');
      }
    }

    // ---------------------------------------------------------
    // ページ読み込み時の初期処理
    // ---------------------------------------------------------

    // DOMContentLoaded: HTMLが読み込み完了したらデータを取得する
    document.addEventListener('DOMContentLoaded', function () {
      loadOmikujiData();
    });

  </script>
</body>
</html>
